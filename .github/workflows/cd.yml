name: CD

# Builds the image and pushes it to GitHub Container Registry.
# No secrets needed: GITHUB_TOKEN is provided by Actions, and `packages: write`
# below is what lets it push. The image lands at
#   ghcr.io/<owner>/cinevec:latest  and  :<commit-sha>
#
# To use Docker Hub instead, add DOCKERHUB_USERNAME / DOCKERHUB_TOKEN as repo
# secrets and change REGISTRY plus the login step's username/password.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Lowercase the image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to the registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}
          # Reuses layers from the last build, so only changed steps re-run.
          cache-from: type=gha
          cache-to: type=gha,mode=max
